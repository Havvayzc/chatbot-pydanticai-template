<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPMN Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #2d3436;
      min-height: 100vh;
    }

    header {
      background: #2d3436;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; color: #b2bec3; }

    main {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      padding: 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #636e72;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    textarea {
      width: 100%;
      height: 280px;
      border: 1.5px solid #dfe6e9;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.92rem;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
      transition: border-color .2s;
    }
    textarea:focus { outline: none; border-color: #0984e3; }

    button#runBtn {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: #0984e3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button#runBtn:hover { background: #0773c5; }
    button#runBtn:disabled { background: #b2bec3; cursor: not-allowed; }

    /* Status badges */
    #statusBar {
      margin-top: 12px;
      min-height: 28px;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-blue  { background: #dfe6ff; color: #2c5fcc; }
    .badge-green { background: #d4f5e9; color: #00864a; }
    .badge-red   { background: #fde8e8; color: #c0392b; }
    .badge-warn  { background: #fff3cd; color: #856404; }

    /* XML output */
    #xmlOutput {
      width: 100%;
      height: 280px;
      background: #1e272e;
      color: #dfe6e9;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      resize: vertical;
      overflow: auto;
    }

    button#copyBtn {
      margin-top: 10px;
      padding: 8px 18px;
      background: #636e72;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background .2s;
    }
    button#copyBtn:hover { background: #2d3436; }

    /* Meta info */
    #metaInfo {
      margin-top: 14px;
      font-size: 0.87rem;
      color: #636e72;
      line-height: 1.8;
    }

    /* Warnings */
    #warnings {
      margin-top: 10px;
    }
    .warning-item {
      background: #fff3cd;
      border-left: 3px solid #f6c343;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #6d4c00;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #b2bec3;
      border-top-color: #0984e3;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>BPMN Pipeline &mdash; Transkript → BPMN 2.0</h1>
    <span>Bachelorarbeit · Sare Yazici · HKA</span>
  </div>
</header>

<main>
  <!-- INPUT -->
  <div class="card">
    <h2>Transkript eingeben</h2>
    <textarea id="transcript" placeholder="Meeting-Transkript hier einfügen ...

Beispiel:
Zuerst prüft der Sachbearbeiter den eingehenden Antrag. Falls der Antrag unvollständig ist, wird er an den Kunden zurückgeschickt. Bei vollständigen Anträgen leitet die Abteilungsleiterin die Genehmigung ein ..."></textarea>
    <button id="runBtn" onclick="runPipeline()">Pipeline starten</button>
    <div id="statusBar"></div>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h2>BPMN 2.0 XML (Ergebnis)</h2>
    <textarea id="xmlOutput" readonly placeholder="Das generierte BPMN XML erscheint hier ..."></textarea>
    <button id="copyBtn" onclick="copyXml()">XML kopieren</button>
    <div id="metaInfo"></div>
    <div id="warnings"></div>
  </div>
</main>

<script>
  async function runPipeline() {
    const transcript = document.getElementById('transcript').value.trim();
    if (!transcript) {
      setStatus('Bitte zuerst ein Transkript eingeben.', 'warn');
      return;
    }

    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    document.getElementById('xmlOutput').value = '';
    document.getElementById('metaInfo').innerHTML = '';
    document.getElementById('warnings').innerHTML = '';
    setStatus('<span class="spinner"></span> Pipeline läuft ... (kann 30–90 Sekunden dauern)', 'blue');

    try {
      const resp = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript })
      });

      if (!resp.ok) {
        const err = await resp.json();
        setStatus('Fehler: ' + (err.detail || resp.statusText), 'red');
        return;
      }

      const data = await resp.json();

      document.getElementById('xmlOutput').value = data.bpmn_xml;

      // Meta info
      const iterText = `${data.iterations} Iteration${data.iterations !== 1 ? 'en' : ''}`;
      const maxText  = data.max_iterations_reached ? ' (Max. erreicht)' : '';
      const summary  = data.judge_summary ? `<br>Judge: <em>${data.judge_summary}</em>` : '';
      document.getElementById('metaInfo').innerHTML =
        `<strong>Iterationen:</strong> ${iterText}${maxText}${summary}`;

      // Warnings
      if (data.warnings && data.warnings.length > 0) {
        document.getElementById('warnings').innerHTML =
          data.warnings.map(w => `<div class="warning-item">⚠ ${w}</div>`).join('');
      }

      setStatus('Fertig!', 'green');
    } catch (e) {
      setStatus('Netzwerkfehler: ' + e.message, 'red');
    } finally {
      btn.disabled = false;
    }
  }

  function setStatus(msg, type) {
    const colors = { blue: 'badge-blue', green: 'badge-green', red: 'badge-red', warn: 'badge-warn' };
    document.getElementById('statusBar').innerHTML =
      `<span class="badge ${colors[type] || ''}">${msg}</span>`;
  }

  function copyXml() {
    const xml = document.getElementById('xmlOutput').value;
    if (!xml) return;
    navigator.clipboard.writeText(xml).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Kopiert ✓';
      setTimeout(() => btn.textContent = 'XML kopieren', 2000);
    });
  }
</script>

</body>
</html>
