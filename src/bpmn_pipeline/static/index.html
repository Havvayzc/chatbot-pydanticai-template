<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPMN Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; color: #1a1a1a; }
    p.subtitle { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 800px;
    }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
    textarea {
      width: 100%;
      height: 280px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      resize: vertical;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #4f46e5; }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.loading { background: #eff6ff; color: #1d4ed8; display: block; }
    .status.error   { background: #fef2f2; color: #b91c1c; display: block; }
    .status.success { background: #f0fdf4; color: #15803d; display: block; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #1d4ed8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>BPMN Generator</h1>
  <p class="subtitle">Transkript eingeben → BPMN 2.0 XML herunterladen</p>

  <div class="card">
    <label for="transcript">Transkript</label>
    <textarea id="transcript" placeholder="Prozessbeschreibung oder Meeting-Transkript hier einfügen…"></textarea>
    <button id="btn" onclick="generate()">BPMN generieren &amp; herunterladen</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    let _pollInterval = null;

    async function generate() {
      const transcript = document.getElementById("transcript").value.trim();
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");

      if (!transcript) {
        status.className = "status error";
        status.textContent = "Bitte zuerst ein Transkript eingeben.";
        return;
      }

      btn.disabled = true;
      status.className = "status loading";
      status.innerHTML = '<span class="spinner"></span>Pipeline gestartet … das kann 5–10 Minuten dauern.';

      try {
        const form = new FormData();
        form.append("transcript", transcript);

        const res = await fetch("/generate", { method: "POST", body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }

        const { job_id } = await res.json();
        _pollInterval = setInterval(() => poll(job_id, btn, status), 3000);

      } catch (e) {
        status.className = "status error";
        status.textContent = "Fehler: " + e.message;
        btn.disabled = false;
      }
    }

    async function poll(job_id, btn, status) {
      try {
        const res = await fetch(`/status/${job_id}`);
        const data = await res.json();

        if (data.status === "running") return;

        clearInterval(_pollInterval);

        if (data.status === "error") {
          status.className = "status error";
          status.textContent = "Fehler: " + (data.detail || "Unbekannter Fehler");
          btn.disabled = false;
          return;
        }

        if (data.status === "done") {
          const blob = await fetch(`/download/${job_id}`).then(r => r.blob());
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "process.bpmn";
          a.click();
          URL.revokeObjectURL(url);

          status.className = "status success";
          status.textContent = "✓ process.bpmn wurde heruntergeladen.";
          btn.disabled = false;
        }

      } catch (e) {
        clearInterval(_pollInterval);
        status.className = "status error";
        status.textContent = "Fehler beim Status-Check: " + e.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
