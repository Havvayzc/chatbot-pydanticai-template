<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot – Pydantic AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Keep the chat area readable and the input fixed at the bottom. */
    body { min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; max-width: 720px; margin: 0 auto; width: 100%; }
    #conversation { min-height: 200px; }
    #conversation .user::before { content: 'You: '; font-weight: 600; color: #0d6efd; }
    #conversation .model::before { content: 'Assistant: '; font-weight: 600; color: #198754; }
    #conversation .user, #conversation .model { padding: 0.5rem 0; border-top: 1px solid #dee2e6; }
    #conversation .user { text-align: right; }
    #spinner {
      opacity: 0;
      transition: opacity 0.2s;
      width: 28px;
      height: 28px;
      border: 3px solid #0d6efd;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #spinner.active { opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display: none; }
  </style>
</head>
<body>
  <main class="p-4">
    <h1 class="h4 mb-2">Chatbot (Pydantic AI)</h1>
    <p class="text-muted small mb-3">Template with extension points for system prompt, model, vector store, MCP tools, and memory.</p>
    <div id="conversation" class="px-2"></div>
    <div class="d-flex justify-content-center my-2">
      <div id="spinner" aria-hidden="true"></div>
    </div>
    <form id="chat-form" method="post" action="/chat/">
      <div class="input-group">
        <input id="prompt-input" name="prompt" class="form-control" placeholder="Type a message…" autocomplete="off">
        <button type="submit" class="btn btn-primary">Send</button>
      </div>
    </form>
    <p id="error" class="text-danger small mt-2">Something went wrong. Check the browser console.</p>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.0/marked.min.js" crossorigin="anonymous"></script>
  <script src="/static/chat.js"></script>
</body>
</html>
